{% extends 'smru/base.html' %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h1 class="display-1 fw-bold text-danger">500</h1>
            <h2 class="mb-4">Server Error</h2>
            <p class="lead text-muted mb-4">
                Something went wrong on our end. Our team has been notified and is working on it.
            </p>
            <div class="mb-4">
                <i class="fas fa-exclamation-triangle fa-5x text-muted"></i>
            </div>
            <p class="text-muted mb-4">
                Please try again later or contact our support team.
            </p>
            <a href="{% url 'smru:home' %}" class="btn btn-primary btn-lg">
                <i class="fas fa-home"></i> Go Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
